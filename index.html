<!doctype html>
<html>
	<head>
		<title>Week 4</title>
		<link rel="stylesheet" type="text/css" href="style/style.css" />
	</head>
  <body>
    <header class="banner">
	    <h1>My Photo Album<button id="login-button">Login</button></h1>
	    
    </header>
    <main>
	    <div class="search-form">
		    <form action="#" id="search-form" >
			    <input type="text" name="keyword" value="" id="search-field" />
			    <input type="submit" value="Search" />
		    </form>
	    </div>
	    <div class="grid" >
		    <div class="row" >
			    <div class="column-1-3" >
				    <figure class="image" >
					    <a href="photos/DSC05750.jpg"><img src="photos/DSC05750.jpg" alt="City View" /></a>
					    <figcaption>City View</figcaption>
				    </figure>
			    </div>
			    <div class="column-1-3" >
				    <figure class="image" >
					    <a href="photos/DSC03810.jpg"><img src="photos/DSC03810.jpg" alt="Ferris Wheel" /></a>
					    <figcaption>Ferris Wheel</figcaption>
				    </figure>
			    </div>
			    <div class="column-1-3" >
				    <figure class="image" >
					    <a href="photos/DSC02511.jpg"><img src="photos/DSC02511.jpg" alt="A building in the forbidden city with extra long text" /></a>
					    <figcaption>A building in the forbidden city with extra long text</figcaption>
				    </figure>
			    </div>
			    <div class="column-1-3" >
				    <figure class="image" >
					    <a href="photos/DSC01066.JPG"><img src="photos/DSC01066.JPG" alt="City from Mt Gravatt lookout" /></a>
					    <figcaption>City from Mt Gravatt lookout</figcaption>
				    </figure>
			    </div>
			    <div class="column-1-3" >
				    <figure class="image" >
					    <a href="photos/DSC01049.JPG"><img src="photos/DSC01049.JPG" alt="Sun rise" /></a>
					    <figcaption>Sun rise</figcaption>
				    </figure>
			    </div>
		    </div>
	    </div>
    </main>
    <footer>
	    <div class="name" >By Lee Fallat</div>
    </footer>

    <script type="text/javascript" src="js/search.js"></script>
  </body>
</html>
